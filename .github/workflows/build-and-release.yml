name: Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS (arm64 + x86_64 via Rosetta)
    runs-on: macos-14
    outputs:
      release_version: ${{ steps.extract_version.outputs.release_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: "3.30.5"

      - name: Install Ninja
        run: brew install ninja || true

      - name: Install Rosetta
        run: sudo softwareupdate --install-rosetta --agree-to-license || true

      - name: Build arm64 (build.sh)
        run: |
          chmod +x build.sh
          export CI=true
          ./build.sh release
          mkdir -p release-assets/macos-arm64
          cp cmake-build-release/wavmarker release-assets/macos-arm64/wavmarker

      - name: Extract version from macOS binary
        id: extract_version
        run: |
          VERSION="$(./cmake-build-release/wavmarker --version | head -n1 | tr -d '\r' | awk '{print $NF}')"
          if [[ -z "${VERSION}" ]]; then
            echo "Error: Failed to extract version from macOS binary." >&2
            exit 1
          fi
          echo "release_version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Detected release version: ${VERSION}"

      - name: Build x86_64 (Rosetta, build.sh)
        run: |
          chmod +x build.sh
          export CI=true
          export ARCH_OVERRIDE=x86_64
          arch -x86_64 ./build.sh release
          mkdir -p release-assets/macos-x86_64
          cp cmake-build-release/wavmarker release-assets/macos-x86_64/wavmarker

      - name: Prepare artifacts
        run: |
          chmod +x release-assets/macos-arm64/wavmarker
          chmod +x release-assets/macos-x86_64/wavmarker
          tar -czf release-assets/wavmarker-macos-arm64.tar.gz -C release-assets/macos-arm64 wavmarker
          tar -czf release-assets/wavmarker-macos-x86_64.tar.gz -C release-assets/macos-x86_64 wavmarker

      - name: Upload macOS arm64 artifact
        uses: actions/upload-artifact@v7
        with:
          name: wavmarker-macos-arm64
          path: release-assets/wavmarker-macos-arm64.tar.gz

      - name: Upload macOS x86_64 artifact
        uses: actions/upload-artifact@v7
        with:
          name: wavmarker-macos-x86_64
          path: release-assets/wavmarker-macos-x86_64.tar.gz

  build-linux:
    name: Build Linux (x86_64)
    # Build on an older glibc baseline so the binary also runs on newer distributions.
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: "3.30.5"

      - name: Install Ninja
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: Build Linux (build.sh)
        run: |
          chmod +x build.sh
          export CI=true
          ./build.sh release

      - name: Prepare artifact
        run: |
          mkdir -p release-assets/linux-x86_64
          cp cmake-build-release/wavmarker release-assets/linux-x86_64/wavmarker
          chmod +x release-assets/linux-x86_64/wavmarker
          tar -czf release-assets/wavmarker-linux-x86_64.tar.gz -C release-assets/linux-x86_64 wavmarker

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: wavmarker-linux-x86_64
          path: release-assets/wavmarker-linux-x86_64.tar.gz

  build-windows:
    name: Build Windows (x86_64 Clang)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup MSYS2 (Clang + CMake + Ninja)
        uses: msys2/setup-msys2@v2
        with:
          update: true
          msystem: MINGW64
          install: >-
            mingw-w64-x86_64-clang
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja

      - name: Add MSYS2 toolchain to PATH
        shell: pwsh
        run: |
          "C:\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "C:\msys64\usr\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build Windows (build.bat)
        shell: cmd
        run: |
          set "PATH=C:\msys64\mingw64\bin;C:\msys64\usr\bin;%PATH%"
          set "CC=clang"
          set "CXX=clang++"
          build.bat release

      - name: Prepare artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-assets\windows-x86_64 | Out-Null
          Copy-Item cmake-build-release\wavmarker.exe release-assets\windows-x86_64\wavmarker.exe
          Compress-Archive -Path release-assets\windows-x86_64\wavmarker.exe -DestinationPath release-assets\wavmarker-windows-x86_64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: wavmarker-windows-x86_64
          path: release-assets/wavmarker-windows-x86_64.zip

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [build-macos, build-linux, build-windows]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: wavmarker-*
          path: release-assets

      - name: Show downloaded assets
        run: find release-assets -maxdepth 3 -type f -print

      - name: Verify release assets
        run: |
          test -f release-assets/wavmarker-macos-arm64/wavmarker-macos-arm64.tar.gz
          test -f release-assets/wavmarker-macos-x86_64/wavmarker-macos-x86_64.tar.gz
          test -f release-assets/wavmarker-linux-x86_64/wavmarker-linux-x86_64.tar.gz
          test -f release-assets/wavmarker-windows-x86_64/wavmarker-windows-x86_64.zip

      - name: Create/replace release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ASSETS_DIR: release-assets
          RELEASE_VERSION: ${{ needs.build-macos.outputs.release_version }}
        run: |
          chmod +x scripts/set_release.sh
          if [[ -z "${RELEASE_VERSION}" ]]; then
            echo "Error: RELEASE_VERSION from build-macos output is empty." >&2
            exit 1
          fi
          echo "Using RELEASE_VERSION=${RELEASE_VERSION}"
          ./scripts/set_release.sh
